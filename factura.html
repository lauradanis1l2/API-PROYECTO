<!DOCTYPE html>
<html>
<head>
    <title>Factura</title>
</head>
<body>
    <div id="encabezado">
        <!-- Contenido del encabezado que no cambia -->
        <h1>Factura</h1>
        <p>Fecha: [Fecha]</p>
        <p>Cliente: [Cliente]</p>
        <!-- Otros detalles del encabezado -->
    </div>
    <div id="contenido">
        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio Unitario</th>
                    <th>Subtotal</th>
                </tr>
            </thead>
            <tbody>
                <!-- Aquí se insertarán los detalles de la factura desde la base de datos -->
            </tbody>
        </table>
    </div>
    <div id="pie">
        <!-- Contenido del pie de página que no cambia -->
        <p>Total a pagar: [Total]</p>
        <!-- Otros detalles del pie de página -->
    </div>
</body>
</html>
